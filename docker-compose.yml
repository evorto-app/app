services:
  db:
    image: neondatabase/neon_local:v1.5
    restart: on-failure:5
    environment:
      BRANCH_ID:
      DELETE_BRANCH: "${DELETE_BRANCH:-true}"
      NEON_API_KEY:
      NEON_DATABASE_NAME: "${NEON_DATABASE_NAME:-appdb}"
      NEON_PROJECT_ID:
      PARENT_BRANCH_ID:
    volumes:
      - "${NEON_LOCAL_METADATA_DIR:-./.neon_local}:/tmp/.neon_local"
    ports:
      - "${NEON_LOCAL_HOST_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U neon -d ${NEON_DATABASE_NAME:-appdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  db-expiration:
    image: oven/bun:1.3.11-alpine
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace
    environment:
      BRANCH_ID:
      DELETE_BRANCH: "${DELETE_BRANCH:-true}"
      NEON_API_KEY:
      NEON_LOCAL_BRANCH_TTL_HOURS: "${NEON_LOCAL_BRANCH_TTL_HOURS:-24}"
      NEON_LOCAL_METADATA_DIR: /tmp/.neon_local
      NEON_LOCAL_METADATA_WAIT_SECONDS: "${NEON_LOCAL_METADATA_WAIT_SECONDS:-60}"
      NEON_PROJECT_ID:
    volumes:
      - .:/workspace:ro
      - "${NEON_LOCAL_METADATA_DIR:-./.neon_local}:/tmp/.neon_local"
    command:
      - /bin/sh
      - -lc
      - bun helpers/testing/set-neon-local-branch-expiration.ts || true
    restart: "no"

  db-setup:
    build:
      context: .
      target: build
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db-expiration:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://neon:npg@db:5432/${NEON_DATABASE_NAME:-appdb}?sslmode=require
      NEON_LOCAL_PROXY: "true"
      STRIPE_TEST_ACCOUNT_ID:
    command:
      - /bin/sh
      - -lc
      - >-
        bun -e 'import { Pool } from "pg"; import { createNodePgPoolConfig } from
        "./src/db/pg-connection-config.ts"; const pool = new
        Pool(createNodePgPoolConfig({ databaseUrl: process.env.DATABASE_URL,
        neonLocalProxy: process.env.NEON_LOCAL_PROXY === "true" })); try { await
        pool.query("DROP SCHEMA IF EXISTS public CASCADE"); await
        pool.query("CREATE SCHEMA public"); await pool.query("CREATE EXTENSION IF
        NOT EXISTS unaccent"); await pool.query("CREATE EXTENSION IF NOT EXISTS
        pg_trgm"); await pool.query("CREATE OR REPLACE FUNCTION
        immutable_unaccent(value text) RETURNS text AS " + String.fromCharCode(39)
        + "SELECT unaccent(value)" + String.fromCharCode(39) + " LANGUAGE sql
        IMMUTABLE;"); } finally { await pool.end(); }' && bun ./node_modules/drizzle-kit/bin.cjs
        push --force && bun helpers/database.ts
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    restart: "no"

  evorto:
    build:
      context: .
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db:
        condition: service_healthy
      db-expiration:
        condition: service_completed_successfully
      db-setup:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: package.json
    environment:
      BASE_URL: http://localhost:${APP_HOST_PORT:-4200}
      CLIENT_ID:
      CLIENT_SECRET:
      CLOUDFLARE_IMAGES_API_TOKEN:
      DATABASE_URL: postgresql://neon:npg@db:5432/${NEON_DATABASE_NAME:-appdb}?sslmode=require
      ISSUER_BASE_URL:
      NEON_LOCAL_PROXY: "true"
      PORT: "4200"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://minio:9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-minioadmin}"
      SECRET:
      STRIPE_API_KEY:
      STRIPE_TEST_ACCOUNT_ID:
      STRIPE_WEBHOOK_SECRET:
    command:
      - /bin/sh
      - -lc
      - mkdir -p /app/logs && bun --preload ./instrument.mjs dist/evorto/server/server.mjs 2>&1 | tee -a /app/logs/server.log
    ports:
      - "${APP_HOST_PORT:-4200}:4200"

  stripe:
    image: stripe/stripe-cli:v1.25.0
    restart: always
    environment:
      STRIPE_API_KEY:
      STRIPE_DEVICE_NAME: integration-tests
    command: "listen --forward-to http://evorto:4200/webhooks/stripe"

secrets:
  FONT_AWESOME_TOKEN:
    environment: FONT_AWESOME_TOKEN
