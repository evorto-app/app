services:
  db:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-appdb}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-evorto-local}"
      POSTGRES_USER: "${POSTGRES_USER:-evorto}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/local-postgres-init.sql:/docker-entrypoint-initdb.d/10-integration-database.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-evorto} -d ${POSTGRES_DB:-appdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  db-setup:
    build:
      context: .
      target: build
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-evorto}:${POSTGRES_PASSWORD:-evorto-local}@db:5432/${POSTGRES_DB:-appdb}?sslmode=disable
      E2E_NOW_ISO:
      E2E_SEED_KEY:
      LOCAL_DATABASE: "true"
      LOCAL_DATABASE_CONFIRM_RESET: evorto-local-reset
      STRIPE_TEST_ACCOUNT_ID:
    command:
      - /bin/sh
      - -lc
      - bun helpers/reset-database-schema.ts && bun ./node_modules/drizzle-kit/bin.cjs push --force && bun helpers/database.ts
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: "500"
      MP_SEND_API_AUTH_ACCEPT_ANY: "true"
    ports:
      - "${MAILPIT_HOST_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:${APP_HOST_PORT:-4200}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    restart: "no"

  evorto:
    build:
      context: .
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      stripe:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: package.json
    environment:
      APP_ENVIRONMENT: local
      APP_ROLE: web
      BASE_URL: http://localhost:${APP_HOST_PORT:-4200}
      CLIENT_ID:
      CLIENT_SECRET:
      DATABASE_POOL_MAX: "20"
      DATABASE_URL: postgresql://${POSTGRES_USER:-evorto}:${POSTGRES_PASSWORD:-evorto-local}@db:5432/${POSTGRES_DB:-appdb}?sslmode=disable
      E2E_GLOBAL_ADMIN_AUTH0_IDS:
      E2E_NOW_ISO:
      E2E_RUNTIME_MODE:
      E2E_SEED_KEY:
      ISSUER_BASE_URL:
      LOCAL_DATABASE: "true"
      NODE_ENV: "development"
      PORT: "4200"
      PUBLIC_GOOGLE_MAPS_API_KEY:
      S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: "http://localhost:${MINIO_HOST_PORT:-9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      SECRET:
      SSR_RPC_ORIGIN: http://localhost:4200
      STRIPE_API_KEY:
      STRIPE_TEST_ACCOUNT_ID:
      STRIPE_WEBHOOK_SECRET:
      STRIPE_WEBHOOK_SECRET_FILE: /run/stripe-webhook/signing-secret
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/logs
        log_pipe="$(mktemp -u /tmp/evorto-server-log.XXXXXX)"
        mkfifo "$$log_pipe"
        tee -a /app/logs/server.log < "$$log_pipe" &
        tee_pid="$!"
        server_pid=""
        finish_tee() {
          (
            sleep 2
            kill -TERM "$$tee_pid" 2>/dev/null || true
          ) &
          tee_watchdog_pid="$$!"
          wait "$$tee_pid" 2>/dev/null || true
          kill -TERM "$$tee_watchdog_pid" 2>/dev/null || true
          wait "$$tee_watchdog_pid" 2>/dev/null || true
        }
        cleanup_server() {
          signal="$$1"
          status="$$2"
          trap - HUP INT TERM
          if [ -n "$$server_pid" ]; then
            kill -"$$signal" "$$server_pid" 2>/dev/null || true
            wait "$$server_pid" 2>/dev/null || true
          fi
          finish_tee
          rm -f "$$log_pipe"
          exit "$$status"
        }
        trap 'cleanup_server HUP 129' HUP
        trap 'cleanup_server INT 130' INT
        trap 'cleanup_server TERM 143' TERM
        bun dist/evorto/server/server.mjs > "$$log_pipe" 2>&1 &
        server_pid="$!"
        set +e
        wait "$$server_pid"
        server_status="$?"
        server_pid=""
        set -e
        finish_tee
        rm -f "$$log_pipe"
        exit "$$server_status"
    ports:
      - "${APP_HOST_PORT:-4200}:4200"
    volumes:
      - stripe-webhook:/run/stripe-webhook:ro

  worker:
    build:
      context: .
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      stripe:
        condition: service_healthy
    environment:
      APP_ENVIRONMENT: local
      APP_ROLE: worker
      DATABASE_POOL_MAX: "5"
      DATABASE_URL: postgresql://${POSTGRES_USER:-evorto}:${POSTGRES_PASSWORD:-evorto-local}@db:5432/${POSTGRES_DB:-appdb}?sslmode=disable
      E2E_NOW_ISO:
      E2E_RUNTIME_MODE:
      EMAIL_DELIVERY_PROVIDER: mailpit
      LOCAL_DATABASE: "true"
      MAILPIT_API_URL: http://mailpit:8025/api/v1/send
      NODE_ENV: development
      S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: "http://localhost:${MINIO_HOST_PORT:-9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      STRIPE_API_KEY:
      WORKER_TRIGGER_MODE: poll
    command:
      - bun
      - dist/evorto/server/server.mjs

  stripe:
    image: stripe/stripe-cli:v1.41.1@sha256:f1e91acd11134c1589c13f35b315f648e274a19074d9bfd2c2a5e39552eef620
    restart: always
    environment:
      STRIPE_API_KEY:
      STRIPE_DEVICE_NAME: integration-tests
    entrypoint: /bin/sh
    command: /usr/local/bin/stripe-listen-docker
    healthcheck:
      test: ["CMD-SHELL", "test -s /run/stripe-webhook/signing-secret"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    volumes:
      - ./helpers/testing/stripe-listen-docker.sh:/usr/local/bin/stripe-listen-docker:ro
      - stripe-webhook:/run/stripe-webhook

secrets:
  FONT_AWESOME_TOKEN:
    environment: FONT_AWESOME_TOKEN

volumes:
  mailpit-data:
  postgres-data:
  stripe-webhook:
