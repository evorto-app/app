services:
  db:
    image: neondatabase/neon_local:latest
    env_file:
      - .env.local
      - .env
    ports:
      - "${NEON_LOCAL_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U neon -d ${NEON_DATABASE_NAME:-appdb}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    restart: "no"

  evorto:
    build:
      context: .
      args:
        FONT_AWESOME_TOKEN: "${FONT_AWESOME_TOKEN:-}"
      secrets:
        - FONT_AWESOME_TOKEN
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: package.json
    env_file:
      - .env.local
      - .env
    environment:
      BASE_URL: http://localhost:${APP_HOST_PORT:-4200}
      DATABASE_URL: postgresql://neon:npg@db:5432/${NEON_DATABASE_NAME:-appdb}?sslmode=disable
      NEON_LOCAL_PROXY: "true"
      PORT: "4200"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-evorto-testing}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://minio:9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-minioadmin}"
      #      This secret is for the local stripe cli, it is not a production secret
      STRIPE_WEBHOOK_SECRET: whsec_5cc4e8e60977a2f87895f2fe5484040de96728381f08f33617633205a0cafae3
    ports:
      - "${APP_HOST_PORT:-4200}:4200"

  stripe:
    image: stripe/stripe-cli:v1.25.0
    restart: always
    env_file:
      - .env.local
      - .env
    environment:
      STRIPE_DEVICE_NAME: integration-tests
    command: "listen --forward-to http://evorto:4200/webhooks/stripe"

secrets:
  FONT_AWESOME_TOKEN:
    environment: FONT_AWESOME_TOKEN
