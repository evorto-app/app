name: Dependabot Changeset + Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-changeset:
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Dependabot branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Detect existing changeset files in PR
        id: existing-changeset
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );

            const hasChangeset = files.some((file) =>
              /^\.changeset\/[^/]+\.md$/.test(file.filename)
            );
            core.setOutput('found', hasChangeset ? 'true' : 'false');

      - name: Generate Dependabot changeset
        if: steps.existing-changeset.outputs.found != 'true'
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changeset_file=".changeset/dependabot-pr-${PR_NUMBER}.md"

          if [ -f "${changeset_file}" ]; then
            echo "Changeset file already exists at ${changeset_file}"
            exit 0
          fi

          cat > "${changeset_file}" <<EOF
          ---
          evorto: patch
          ---

          Dependabot dependency update for PR #${PR_NUMBER}.

          - Dependencies: ${DEPENDENCY_NAMES}
          - Update type: ${UPDATE_TYPE}
          EOF

      - name: Commit and push changeset
        if: steps.existing-changeset.outputs.found != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changeset_file=".changeset/dependabot-pr-${PR_NUMBER}.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${changeset_file}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(deps): add changeset for dependabot PR #${PR_NUMBER}"
          git push

  enable-automerge:
    needs: add-changeset
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: github.event.pull_request.draft == false && (steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "${PR_URL}"
