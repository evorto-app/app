name: E2E Baseline

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (functional + docs)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      CI: true
      APP_HOST_PORT: 4200
      BASE_URL: http://localhost:4200
      PLAYWRIGHT_TEST_BASE_URL: http://localhost:4200
      COMPOSE_PROJECT_NAME: evorto-ci
      NEON_DATABASE_NAME: appdb
      NEON_LOCAL_HOST_PORT: 55432
      NEON_LOCAL_PROXY: true
      NO_WEBSERVER: true
      DATABASE_URL: postgresql://neon:npg@localhost:55432/appdb?sslmode=require
      E2E_NOW_ISO: 2026-02-01T12:00:00.000Z
      E2E_SEED_KEY: ci-e2e-seed-v1
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
      AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_TEST_ACCOUNT_ID: ${{ secrets.STRIPE_TEST_ACCOUNT_ID || vars.STRIPE_TEST_ACCOUNT_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      S3_ACCESS_KEY_ID: minioadmin
      S3_BUCKET: evorto-ci
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: minioadmin
      CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_IMAGES_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_API_TOKEN }}
      PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}

    steps:
      - name: Checkout repository
        # Use sparse-checkout false to ensure .env and Docker context are available
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Validate required configuration
        run: |
          if [ -z "${FONT_AWESOME_TOKEN}" ]; then
            echo "::error::Missing required secret: FONT_AWESOME_TOKEN"
            exit 1
          fi
          if [ -z "${NEON_API_KEY}" ]; then
            echo "::error::Missing required secret: NEON_API_KEY"
            exit 1
          fi
          if [ -z "${NEON_PROJECT_ID}" ]; then
            echo "::error::Missing required repository variable: NEON_PROJECT_ID"
            exit 1
          fi
          if [ -z "${STRIPE_TEST_ACCOUNT_ID}" ]; then
            echo "::error::Missing required Stripe connected account id. Set STRIPE_TEST_ACCOUNT_ID as a secret or repository variable."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Write CI env files
        run: |
          cat > .env <<EOF
          DATABASE_URL=${DATABASE_URL}
          E2E_NOW_ISO=${E2E_NOW_ISO}
          E2E_SEED_KEY=${E2E_SEED_KEY}
          NEON_LOCAL_PROXY=${NEON_LOCAL_PROXY}
          NEON_DATABASE_NAME=${NEON_DATABASE_NAME}
          NEON_API_KEY=${NEON_API_KEY}
          NEON_PROJECT_ID=${NEON_PROJECT_ID}
          AUTH0_MANAGEMENT_CLIENT_ID=${AUTH0_MANAGEMENT_CLIENT_ID}
          AUTH0_MANAGEMENT_CLIENT_SECRET=${AUTH0_MANAGEMENT_CLIENT_SECRET}
          CLIENT_ID=${CLIENT_ID}
          CLIENT_SECRET=${CLIENT_SECRET}
          STRIPE_API_KEY=${STRIPE_API_KEY}
          STRIPE_TEST_ACCOUNT_ID=${STRIPE_TEST_ACCOUNT_ID}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
          S3_BUCKET=${S3_BUCKET}
          S3_ENDPOINT=${S3_ENDPOINT}
          S3_REGION=${S3_REGION}
          S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
          CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN}
          CLOUDFLARE_IMAGES_API_TOKEN=${CLOUDFLARE_IMAGES_API_TOKEN}
          PARENT_BRANCH_ID=${PARENT_BRANCH_ID}
          BASE_URL=${BASE_URL}
          PLAYWRIGHT_TEST_BASE_URL=${PLAYWRIGHT_TEST_BASE_URL}
          EOF
          cp .env .env.development

      - name: Pull Docker images (compose)
        run: docker compose pull

      - name: Build Docker images (compose)
        run: docker compose build --pull

      - name: Start Docker stack for E2E
        run: |
          docker compose down --remove-orphans
          docker compose up -d
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error "${BASE_URL}" >/dev/null; then
              echo "Application is reachable at ${BASE_URL}"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Application did not become reachable at ${BASE_URL} within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100
          exit 1

      - name: Run Playwright suites
        run: |
          mkdir -p test-results/docker-logs
          if [ "${ACTIONS_STEP_DEBUG:-false}" = "true" ]; then
            docker compose logs -f --no-color 2>&1 | tee test-results/docker-logs/live-docker.log &
            LOG_STREAM_PID=$!
            cleanup() {
              if [ -n "${LOG_STREAM_PID:-}" ] && kill -0 "${LOG_STREAM_PID}" 2>/dev/null; then
                kill "${LOG_STREAM_PID}" || true
                wait "${LOG_STREAM_PID}" || true
              fi
            }
            trap cleanup EXIT
          fi

          bun run test:e2e --project=local-chrome

          DOCS_OUT_DIR=test-results/docs \
          DOCS_IMG_OUT_DIR=test-results/docs/images \
          bunx playwright test --project=docs --grep-invert "@finance" \
            --reporter=github,dot,./tests/support/reporters/documentation-reporter.ts

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p test-results/docker-logs
          docker compose logs --no-color > test-results/docker-logs/docker-compose.log || true
          evorto_container_id="$(docker compose ps -q evorto)"
          if [ -n "${evorto_container_id}" ]; then
            docker cp "${evorto_container_id}:/app/logs/server.log" test-results/docker-logs/server.log || true
          fi

      - name: Stop Docker stack
        if: always()
        run: docker compose down --remove-orphans

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docs
          path: test-results/docs/**
          if-no-files-found: ignore
          retention-days: 14
