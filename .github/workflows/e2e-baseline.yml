name: E2E Baseline

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-protected-ref:
    name: Require protected main E2E source
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reject unprotected E2E refs
        env:
          E2E_REF: ${{ github.ref }}
          E2E_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          if [ "${E2E_REF}" != "refs/heads/main" ]; then
            echo "::error::Credential-backed E2E may run only from refs/heads/main"
            exit 1
          fi
          if [ "${E2E_REF_PROTECTED}" != "true" ]; then
            echo "::error::Credential-backed E2E requires a protected main ref"
            exit 1
          fi

  e2e:
    name: Playwright E2E (functional + docs)
    needs: validate-protected-ref
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: esncard-release-certification
    env:
      CI: true
      APP_HOST_PORT: 4200
      BASE_URL: http://localhost:4200
      APP_READY_PATH: /readyz
      COMPOSE_PROJECT_NAME: evorto-ci
      DELETE_BRANCH: true
      NEON_DATABASE_NAME: appdb
      NEON_LOCAL_BRANCH_TTL_HOURS: 4
      NEON_LOCAL_HOST_PORT: 55432
      NEON_LOCAL_METADATA_DIR: /tmp/neon-local-metadata
      NEON_LOCAL_METADATA_WAIT_SECONDS: 180
      NEON_LOCAL_PROXY: true
      MINIO_HOST_PORT: 9000
      NO_WEBSERVER: true
      DATABASE_URL: postgresql://neon:npg@localhost:55432/appdb?sslmode=require
      E2E_NOW_ISO: "2026-09-15T12:00:00.000Z"
      E2E_RUNTIME_MODE: playwright
      E2E_SEED_KEY: evorto-e2e-default-v1
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      ISSUER_BASE_URL: ${{ vars.ISSUER_BASE_URL }}
      RESEND_API_KEY: re_test_ci_e2e_no_delivery
      STRIPE_TEST_ACCOUNT_ID: ${{ vars.STRIPE_TEST_ACCOUNT_ID }}
      S3_ACCESS_KEY_ID: minioadmin
      S3_BUCKET: evorto-ci
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: minioadmin
    steps:
      - name: Validate required configuration
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_TEST_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          for variable_name in FONT_AWESOME_TOKEN NEON_API_KEY NEON_PROJECT_ID PARENT_BRANCH_ID CLIENT_ID CLIENT_SECRET E2E_ADMIN_USER_PASSWORD E2E_DEFAULT_USER_PASSWORD E2E_EMPTY_USER_PASSWORD E2E_GLOBAL_ADMIN_USER_PASSWORD E2E_ORGANIZER_USER_PASSWORD E2E_REGULAR_USER_PASSWORD ISSUER_BASE_URL SECRET STRIPE_TEST_API_KEY STRIPE_TEST_ACCOUNT_ID STRIPE_WEBHOOK_SECRET; do
            if [ -z "${!variable_name}" ]; then
              echo "::error::Missing required E2E configuration: ${variable_name}"
              exit 1
            fi
          done
          if [[ "${STRIPE_TEST_API_KEY}" != sk_test_* ]]; then
            echo "::error::STRIPE_TEST_API_KEY must be a Stripe test-mode secret key"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.15.0"

      - name: Install dependencies
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "::error::Dependency installation failed after 3 attempts"
              exit 1
            fi
            retry_delay_seconds=$((attempt * 15))
            echo "::warning::Dependency installation attempt ${attempt} failed; retrying in ${retry_delay_seconds}s"
            sleep "${retry_delay_seconds}"
          done

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Prepare Neon Local metadata directory
        run: |
          rm -rf "${NEON_LOCAL_METADATA_DIR}"
          mkdir -p "${NEON_LOCAL_METADATA_DIR}"
          chmod 0777 "${NEON_LOCAL_METADATA_DIR}"

      - name: Pull Docker images (compose)
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: docker compose pull

      - name: Build Docker images (compose)
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: docker compose build --pull

      - name: Start Docker stack for E2E
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: |
          docker compose down --timeout 60 --remove-orphans
          docker compose up -d db db-expiration minio stripe minio-init
          for _ in $(seq 1 60); do
            if docker compose exec -T db pg_isready -h 127.0.0.1 -p 5432 -U neon -d "${NEON_DATABASE_NAME}" >/dev/null 2>&1; then
              echo "Database is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Database did not become reachable within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100 db-expiration db-setup minio minio-init evorto
          exit 1

      - name: Confirm Neon branch expiration
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: bun helpers/testing/set-neon-local-branch-expiration.ts

      - name: Start application container
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: docker compose up -d evorto

      - name: Wait for application
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          ready_url="${BASE_URL}${APP_READY_PATH}"
          for _ in $(seq 1 60); do
            ready_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${ready_url}" || true)"
            if [ "${ready_status}" = "204" ]; then
              echo "Application is reachable at ${ready_url}"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Application did not become reachable at ${ready_url} within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100 db-expiration db-setup minio minio-init evorto
          exit 1

      - name: Run Playwright suites
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          mkdir -p test-results/docker-logs
          if [ "${ACTIONS_STEP_DEBUG:-false}" = "true" ]; then
            docker compose logs -f --no-color db-expiration db-setup minio minio-init evorto 2>&1 | tee test-results/docker-logs/live-docker.log &
            LOG_STREAM_PID=$!
            cleanup() {
              if [ -n "${LOG_STREAM_PID:-}" ] && kill -0 "${LOG_STREAM_PID}" 2>/dev/null; then
                kill "${LOG_STREAM_PID}" || true
                wait "${LOG_STREAM_PID}" || true
              fi
            }
            trap cleanup EXIT
          fi

          E2E_SELECTED_PROJECTS=local-chrome-baseline \
          PLAYWRIGHT_SELECTED_PROJECTS=local-chrome-baseline \
          bun run test:e2e -- --trace=off

          DOCS_OUT_DIR=test-results/docs \
          DOCS_IMG_OUT_DIR=test-results/docs/images \
          E2E_SELECTED_PROJECTS=docs-baseline \
          PLAYWRIGHT_SELECTED_PROJECTS=docs-baseline \
          bunx playwright test --project=docs-baseline \
            --trace=off \
            --reporter=./tests/support/reporters/protected-value-sanitizer-reporter.ts,github,dot,./tests/support/reporters/documentation-reporter.ts,./tests/support/reporters/complete-playwright-run-reporter.ts

      - name: Collect Docker logs
        if: always()
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          mkdir -p test-results/docker-logs
          docker compose logs --no-color db-expiration db-setup minio minio-init evorto > test-results/docker-logs/docker-compose.log || true
          evorto_container_id="$(docker compose ps -q evorto)"
          if [ -n "${evorto_container_id}" ]; then
            docker cp "${evorto_container_id}:/app/logs/server.log" test-results/docker-logs/server.log || true
          fi

      - name: Stop Docker stack
        if: always()
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: docker compose down --timeout 60 --remove-orphans

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results
          path: |
            test-results/**
            !test-results/docs/**
            !test-results/**/trace.zip
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-docs
          path: |
            test-results/docs/**
            !test-results/docs/**/trace.zip
          if-no-files-found: ignore
          retention-days: 14
