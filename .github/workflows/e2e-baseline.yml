name: E2E Baseline

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  warm-ci-caches:
    name: Warm CI dependency caches
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILDKIT_BUN_CACHE_DIR: buildkit-bun-cache
      DOCKER_BUILD_CACHE_DIR: /tmp/evorto-docker-build-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun dependency caches
        id: bun-dependency-caches
        uses: ./.github/actions/setup-bun-dependency-caches
        with:
          bun-version: "1.3.11"

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DOCKER_BUILD_CACHE_DIR }}
          key: ${{ runner.os }}-docker-build-bun-1.3.11-${{ hashFiles('Dockerfile', 'docker-compose.yml', '.github/docker-compose.build-cache.yml', 'package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-bun-1.3.11-

      - name: Restore Docker Bun cache mount
        id: docker-bun-cache-mount
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILDKIT_BUN_CACHE_DIR }}
          key: ${{ runner.os }}-docker-bun-cache-mount-1.3.11-${{ hashFiles('package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-docker-bun-cache-mount-1.3.11-

      - name: Inject Docker Bun cache mount
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-map: |
            {
              "${{ env.BUILDKIT_BUN_CACHE_DIR }}": {
                "target": "/home/bun/.bun/install/cache",
                "id": "bun-install-cache"
              }
            }
          skip-extraction: ${{ steps.docker-bun-cache-mount.outputs.cache-hit }}

      - name: Prepare Docker build cache directory
        run: mkdir -p "${DOCKER_BUILD_CACHE_DIR}"

      - name: Install dependencies
        env:
          BUN_DEPENDENCY_TREE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-hit }}
          BUN_PACKAGE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.package-cache-hit }}
          CI_DEPENDENCY_INSTALL_MODE: warm
        run: bash helpers/testing/install-ci-dependencies.sh

      - name: Save warmed Bun package cache
        if: steps.bun-dependency-caches.outputs.package-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.bun-dependency-caches.outputs.package-cache-primary-key }}

      - name: Save warmed Bun dependency tree
        if: steps.bun-dependency-caches.outputs.dependency-tree-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-primary-key }}

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.59.1-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-1.59.1-

      - name: Warm Playwright browser cache
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Warm Docker build cache
        run: |
          timeout 8m docker build \
            --target dependencies \
            --cache-from type=gha,scope=evorto-dependencies \
            --cache-to type=gha,scope=evorto-dependencies,mode=max \
            --progress=plain \
            .

  e2e:
    name: Playwright E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        suite: [functional-1, functional-2, docs]
    env:
      CI: true
      APP_HOST_PORT: 4200
      BASE_URL: http://localhost:4200
      APP_READY_PATH: /robots.txt
      COMPOSE_PROJECT_NAME: evorto-ci
      DELETE_BRANCH: true
      NEON_DATABASE_NAME: appdb
      NEON_LOCAL_BRANCH_TTL_HOURS: 4
      NEON_LOCAL_HOST_PORT: 55432
      NEON_LOCAL_METADATA_DIR: /tmp/neon-local-metadata
      NEON_LOCAL_METADATA_WAIT_SECONDS: 180
      NEON_LOCAL_PROXY: true
      NO_WEBSERVER: true
      DATABASE_URL: postgresql://neon:npg@localhost:55432/appdb?sslmode=require
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      ISSUER_BASE_URL: ${{ secrets.ISSUER_BASE_URL || vars.ISSUER_BASE_URL || 'https://tumi-dev.eu.auth0.com' }}
      SECRET: ${{ secrets.SECRET || vars.SECRET || 'ci-localtestingsecret' }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_TEST_ACCOUNT_ID: ${{ secrets.STRIPE_TEST_ACCOUNT_ID || vars.STRIPE_TEST_ACCOUNT_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      S3_ACCESS_KEY_ID: minioadmin
      S3_BUCKET: evorto-ci
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: minioadmin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun dependency caches
        id: bun-dependency-caches
        uses: ./.github/actions/setup-bun-dependency-caches
        with:
          bun-version: "1.3.11"

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Restore Docker build cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DOCKER_BUILD_CACHE_DIR }}
          key: ${{ runner.os }}-docker-build-bun-1.3.11-${{ hashFiles('Dockerfile', 'docker-compose.yml', '.github/docker-compose.build-cache.yml', 'package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-bun-1.3.11-

      - name: Restore Docker Bun cache mount
        id: docker-bun-cache-mount
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BUILDKIT_BUN_CACHE_DIR }}
          key: ${{ runner.os }}-docker-bun-cache-mount-1.3.11-${{ hashFiles('package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-docker-bun-cache-mount-1.3.11-

      - name: Require warmed Docker Bun cache mount
        run: |
          echo "Docker Bun cache mount hit: ${{ steps.docker-bun-cache-mount.outputs.cache-hit }}"
          if [ "${{ steps.docker-bun-cache-mount.outputs.cache-hit }}" != "true" ]; then
            echo "::error::Docker Bun cache mount was not restored after warm-ci-caches. Refusing Docker builds that could repeat Font Awesome package downloads inside each E2E worker."
            exit 1
          fi

      - name: Inject Docker Bun cache mount
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-map: |
            {
              "${{ env.BUILDKIT_BUN_CACHE_DIR }}": {
                "target": "/home/bun/.bun/install/cache",
                "id": "bun-install-cache"
              }
            }
          skip-extraction: true

      - name: Restore Playwright browser cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.59.1-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-1.59.1-

      - name: Prepare Docker build cache directory
        run: mkdir -p "${DOCKER_BUILD_CACHE_DIR}"

      - name: Validate required configuration
        run: |
          if [ -z "${NEON_API_KEY}" ]; then
            echo "::error::Missing required secret: NEON_API_KEY"
            exit 1
          fi
          if [ -z "${NEON_PROJECT_ID}" ]; then
            echo "::error::Missing required repository variable: NEON_PROJECT_ID"
            exit 1
          fi
          if [ -z "${STRIPE_TEST_ACCOUNT_ID}" ]; then
            echo "::error::Missing required Stripe connected account id. Set STRIPE_TEST_ACCOUNT_ID as a secret or repository variable."
            exit 1
          fi
          if [ -z "${CLIENT_SECRET}" ]; then
            echo "::error::Missing required secret: CLIENT_SECRET"
            exit 1
          fi
          if [ -z "${ISSUER_BASE_URL}" ]; then
            echo "::error::Missing required Auth0 issuer URL. Set ISSUER_BASE_URL as a secret or repository variable."
            exit 1
          fi
          if [ -z "${SECRET}" ]; then
            echo "::error::Missing required secret: SECRET"
            exit 1
          fi
          if [ -z "${STRIPE_API_KEY}" ]; then
            echo "::error::Missing required secret: STRIPE_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        env:
          BUN_DEPENDENCY_TREE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-hit }}
          BUN_PACKAGE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.package-cache-hit }}
          CI_DEPENDENCY_INSTALL_MISSING_CACHE_MESSAGE: Bun dependency tree cache was not restored after warm-ci-caches. Refusing a parallel registry install to avoid repeated Font Awesome package downloads.
          CI_DEPENDENCY_INSTALL_MODE: offline-required
        run: bash helpers/testing/install-ci-dependencies.sh

      - name: Save Bun dependency tree from package cache
        if: steps.bun-dependency-caches.outputs.dependency-tree-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-primary-key }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Prepare Neon Local metadata directory
        run: |
          rm -rf "${NEON_LOCAL_METADATA_DIR}"
          mkdir -p "${NEON_LOCAL_METADATA_DIR}"
          chmod 0777 "${NEON_LOCAL_METADATA_DIR}"

      - name: Start Docker stack for E2E
        timeout-minutes: 25
        run: bash helpers/testing/ci-start-docker-stack.sh

      - name: Confirm Neon branch expiration
        continue-on-error: true
        run: bun helpers/testing/set-neon-local-branch-expiration.ts

      - name: Wait for application
        run: |
          ready_url="${BASE_URL}${APP_READY_PATH}"
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error "${ready_url}" >/dev/null; then
              echo "Application is reachable at ${ready_url}"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Application did not become reachable at ${ready_url} within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100
          exit 1

      - name: Run Playwright functional suite
        if: startsWith(matrix.suite, 'functional-')
        timeout-minutes: 40
        env:
          E2E_SELECTED_PROJECTS: local-chrome-baseline
        run: |
          mkdir -p test-results/docker-logs
          if [ "${ACTIONS_STEP_DEBUG:-false}" = "true" ]; then
            docker compose logs -f --no-color 2>&1 | tee test-results/docker-logs/live-docker.log &
            LOG_STREAM_PID=$!
            cleanup() {
              if [ -n "${LOG_STREAM_PID:-}" ] && kill -0 "${LOG_STREAM_PID}" 2>/dev/null; then
                kill "${LOG_STREAM_PID}" || true
                wait "${LOG_STREAM_PID}" || true
              fi
            }
            trap cleanup EXIT
          fi

          if [ "${{ matrix.suite }}" = "functional-1" ]; then
            bunx playwright test --project=local-chrome-baseline --shard=1/2 \
              --grep-invert 'doc-screenshot returns a relative path and writes image|navigate to events list|create template in empty category|create a new template|template create form hides selected roles in autocomplete|register for a free event as regular user|@finance'
          else
            bunx playwright test --project=local-chrome-baseline --shard=2/2 \
              --grep-invert 'doc-screenshot returns a relative path and writes image|navigate to events list|create template in empty category|create a new template|template create form hides selected roles in autocomplete|register for a free event as regular user|@finance'
          fi

      - name: Run Playwright docs suite
        if: matrix.suite == 'docs'
        timeout-minutes: 20
        env:
          E2E_SELECTED_PROJECTS: docs-baseline
        run: |
          DOCS_OUT_DIR=test-results/docs \
          DOCS_IMG_OUT_DIR=test-results/docs/images \
          bunx playwright test --project=docs-baseline \
            --reporter=github,dot,./tests/support/reporters/documentation-reporter.ts

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p test-results/docker-logs
          docker compose logs --no-color > test-results/docker-logs/docker-compose.log || true
          evorto_container_id="$(docker compose ps -q evorto)"
          if [ -n "${evorto_container_id}" ]; then
            docker cp "${evorto_container_id}:/app/logs/server.log" test-results/docker-logs/server.log || true
          fi

      - name: Stop Docker stack
        if: always()
        timeout-minutes: 10
        run: bash helpers/testing/ci-stop-docker-stack.sh

      - name: Prune expired Neon branches after E2E
        if: always()
        timeout-minutes: 5
        run: bash helpers/testing/ci-prune-neon-local-branches.sh

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.suite }}
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload generated docs
        if: always() && matrix.suite == 'docs'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docs
          path: test-results/docs/**
          if-no-files-found: ignore
          retention-days: 14
