name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  esncard-provider-certification:
    name: Required live ESNcard certification
    if: (github.head_ref == 'knope/release' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/esncard-release-certification.yml
    secrets: inherit

  release:
    if: (github.head_ref == 'knope/release' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    needs: esncard-provider-certification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Release hook placeholder
        run: echo "Add publish/deploy steps for Knope releases."
