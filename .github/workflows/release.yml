name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read

jobs:
  provider-certification:
    name: Required production provider certification
    if: github.head_ref == 'knope/release' && github.event.pull_request.merged == true
    uses: ./.github/workflows/esncard-release-certification.yml
    secrets:
      AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
      AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
      E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
      E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
      E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
      E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
      E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
      E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER }}
      E2E_LIVE_ESN_CARD_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_IDENTIFIER }}
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
      PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
      SECRET: ${{ secrets.SECRET }}
      STRIPE_TEST_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}

  release:
    name: Publish certified GitHub release
    if: github.head_ref == 'knope/release' && github.event.pull_request.merged == true
    needs: provider-certification
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout the merged release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Require successful quality workflows for the release SHA
        env:
          EXPECTED_RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          required_workflows=(
            "pr-quality.yml:PR Quality"
            "e2e-baseline.yml:E2E Baseline"
          )
          deadline=$((SECONDS + 3600))

          while true; do
            all_succeeded=true

            for required_workflow in "${required_workflows[@]}"; do
              workflow_file="${required_workflow%%:*}"
              workflow_name="${required_workflow#*:}"
              workflow_runs=''

              if ! workflow_runs="$(
                gh api \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?head_sha=${EXPECTED_RELEASE_SHA}&event=push&per_page=100"
              )"; then
                echo "::warning::Could not read ${workflow_name} runs; retrying."
                all_succeeded=false
                continue
              fi

              workflow_run="$(
                jq -c --arg sha "${EXPECTED_RELEASE_SHA}" '
                  [
                    .workflow_runs[]
                    | select(
                        .head_sha == $sha
                        and .head_branch == "main"
                        and .event == "push"
                      )
                  ]
                  | sort_by(.run_number)
                  | last // empty
                ' <<<"${workflow_runs}"
              )"

              if [ -z "${workflow_run}" ]; then
                echo "Waiting for ${workflow_name} to start for ${EXPECTED_RELEASE_SHA}."
                all_succeeded=false
                continue
              fi

              workflow_status="$(jq -r '.status' <<<"${workflow_run}")"
              workflow_conclusion="$(jq -r '.conclusion' <<<"${workflow_run}")"
              workflow_url="$(jq -r '.html_url' <<<"${workflow_run}")"

              case "${workflow_status}:${workflow_conclusion}" in
                completed:success)
                  echo "${workflow_name} succeeded for ${EXPECTED_RELEASE_SHA}: ${workflow_url}"
                  ;;
                completed:*)
                  echo "::error::${workflow_name} completed with ${workflow_conclusion} for ${EXPECTED_RELEASE_SHA}: ${workflow_url}"
                  exit 1
                  ;;
                *)
                  echo "Waiting for ${workflow_name} (${workflow_status}) for ${EXPECTED_RELEASE_SHA}: ${workflow_url}"
                  all_succeeded=false
                  ;;
              esac
            done

            if [ "${all_succeeded}" = true ]; then
              break
            fi
            if ((SECONDS >= deadline)); then
              echo "::error::Timed out waiting for required quality workflows for ${EXPECTED_RELEASE_SHA}."
              exit 1
            fi
            sleep 15
          done

      - name: Verify and publish the certified Knope draft
        env:
          EXPECTED_RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(
            jq -er '
              .version
              | select(
                  type == "string"
                  and test("^[0-9]+\\.[0-9]+\\.[0-9]+$")
                )
            ' package.json
          )"
          tag="v${version}"

          if ! grep -Fq "## ${version} (" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no release section for ${version}."
            exit 1
          fi

          release_json="$(mktemp)"
          trap 'rm -f "${release_json}"' EXIT

          release_found=false
          for _ in $(seq 1 30); do
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" >"${release_json}" 2>/dev/null; then
              release_found=true
              break
            fi
            sleep 10
          done
          if [ "${release_found}" != true ]; then
            echo "::error::Knope Bot did not create the expected draft release ${tag}."
            exit 1
          fi

          jq -e --arg tag "${tag}" '
            .tag_name == $tag
            and .draft == true
            and .prerelease == false
            and (.body | type == "string" and length > 0)
          ' "${release_json}" >/dev/null

          git fetch --force --no-tags origin "refs/tags/${tag}:refs/tags/${tag}"
          release_sha="$(git rev-parse "${tag}^{commit}")"
          expected_sha="$(git rev-parse "${EXPECTED_RELEASE_SHA}^{commit}")"
          if [ "${release_sha}" != "${expected_sha}" ]; then
            echo "::error::Release tag ${tag} points to ${release_sha}, expected ${expected_sha}."
            exit 1
          fi

          gh release edit "${tag}" --draft=false --latest --verify-tag
          published_release_url="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" |
              jq -er 'select(.draft == false and .prerelease == false) | .html_url'
          )"
          echo "${published_release_url}"
