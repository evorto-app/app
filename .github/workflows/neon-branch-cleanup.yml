name: Neon Branch Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  workflow_run:
    workflows: ["E2E Baseline"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: neon-branch-cleanup
  cancel-in-progress: false

env:
  DELETE_BRANCH: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_LOCAL_BRANCH_TTL_HOURS: 2
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

jobs:
  cleanup:
    name: Prune stale Neon Local branches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Validate required configuration
        run: bash helpers/testing/validate-ci-runtime-env.sh neon-cleanup

      - name: Prune branches outside the active-test TTL
        run: bash helpers/testing/ci-prune-neon-local-branches.sh
