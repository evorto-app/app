# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Configure package registry token
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          if [ -n "$FONT_AWESOME_TOKEN" ]; then
            printf '%s\n' \
              '@fortawesome:registry=https://npm.fontawesome.com/' \
              "//npm.fontawesome.com/:_authToken=${FONT_AWESOME_TOKEN}" \
              'always-auth=true' \
              > "$HOME/.npmrc"
          fi
      - run: bun install --frozen-lockfile
      - name: Apply database schema
        run: bunx --bun drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Remove package registry token
        if: always()
        run: rm -f "$HOME/.npmrc"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-secret=SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} --build-secret=FONT_AWESOME_TOKEN=${{ secrets.FONT_AWESOME_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
