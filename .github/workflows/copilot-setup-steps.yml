name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/setup-bun-dependency-caches/action.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/actions/setup-bun-dependency-caches/action.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
      AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      CLOUDFLARE_IMAGES_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_S3_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_S3_KEY }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun dependency caches
        id: bun-dependency-caches
        uses: ./.github/actions/setup-bun-dependency-caches
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        env:
          BUN_DEPENDENCY_TREE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-hit }}
          BUN_PACKAGE_CACHE_HIT: ${{ steps.bun-dependency-caches.outputs.package-cache-hit }}
          CI_DEPENDENCY_INSTALL_MODE: warm
        run: bash helpers/testing/install-ci-dependencies.sh

      - name: Save Bun package cache
        if: steps.bun-package-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.bun-package-cache.outputs.cache-primary-key }}

      - name: Save Bun dependency tree from package cache
        if: steps.bun-dependency-caches.outputs.dependency-tree-cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.bun-dependency-caches.outputs.dependency-tree-cache-primary-key }}

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.59.1-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-1.59.1-

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps
