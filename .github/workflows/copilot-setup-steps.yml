name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
      AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      CLOUDFLARE_IMAGES_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_S3_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_S3_KEY }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Enforce public Font Awesome dependencies
        run: bash helpers/testing/prepare-public-fontawesome-ci.sh

      - name: Restore Bun package cache
        id: bun-package-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.11-

      - name: Restore Bun dependency tree
        id: bun-dependency-tree-cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-node-modules-1.3.11-${{ hashFiles('package.json', 'bun.lock', 'bunfig.toml', 'patches/**') }}
          restore-keys: |
            ${{ runner.os }}-bun-node-modules-1.3.11-

      - name: Install dependencies
        run: |
          echo "Bun package cache hit: ${{ steps.bun-package-cache.outputs.cache-hit }}"
          echo "Bun dependency tree cache hit: ${{ steps.bun-dependency-tree-cache.outputs.cache-hit }}"
          bun_package_cache_restored="false"
          if [ -n "$(find "${HOME}/.bun/install/cache" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
            bun_package_cache_restored="true"
          fi
          echo "Bun package cache restored: ${bun_package_cache_restored}"
          if [ "${{ steps.bun-dependency-tree-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Bun dependency tree cache restored; skipping registry install."
            exit 0
          fi
          if [ "${bun_package_cache_restored}" = "true" ]; then
            echo "Bun dependency tree cache was not restored; installing offline from the warmed package cache."
            if bun install --frozen-lockfile --offline --cache-dir ~/.bun/install/cache; then
              exit 0
            fi
            echo "::warning::Offline Bun install failed even though the package cache was restored. Retrying once through the Copilot setup registry install."
          fi
          bun install --frozen-lockfile --cache-dir ~/.bun/install/cache

      - name: Save Bun package cache
        if: steps.bun-package-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.bun-package-cache.outputs.cache-primary-key }}

      - name: Save Bun dependency tree from package cache
        if: steps.bun-dependency-tree-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.bun-dependency-tree-cache.outputs.cache-primary-key }}

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.59.1-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-1.59.1-

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps
