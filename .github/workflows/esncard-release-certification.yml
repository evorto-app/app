name: ESNcard Release Certification

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esncard-release-certification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  certify:
    name: Live add, refresh, remove, and provider-error UX
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: esncard-release-certification
    env:
      APP_HOST_PORT: 4200
      APP_READY_PATH: /readyz
      BASE_URL: http://localhost:4200
      CI: true
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      COMPOSE_PROJECT_NAME: evorto-esncard-release
      DATABASE_URL: postgresql://neon:npg@localhost:55432/appdb?sslmode=require
      DELETE_BRANCH: true
      E2E_LIVE_ESN_CARD_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_IDENTIFIER }}
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      ISSUER_BASE_URL: ${{ vars.ISSUER_BASE_URL }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_DATABASE_NAME: appdb
      NEON_LOCAL_BRANCH_TTL_HOURS: 4
      NEON_LOCAL_HOST_PORT: 55432
      NEON_LOCAL_METADATA_DIR: /tmp/neon-local-metadata
      NEON_LOCAL_METADATA_WAIT_SECONDS: 180
      NEON_LOCAL_PROXY: true
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
      NO_WEBSERVER: true
      PARENT_BRANCH_ID: ${{ secrets.PARENT_BRANCH_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_test_esncard_release_no_delivery' }}
      S3_ACCESS_KEY_ID: minioadmin
      S3_BUCKET: evorto-esncard-release
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: minioadmin
      SECRET: ${{ secrets.SECRET }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_TEST_ACCOUNT_ID: ${{ vars.STRIPE_TEST_ACCOUNT_ID }}
      STRIPE_WEBHOOK_SECRET: whsec_esncard_release_not_used
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Require approved release credential
        shell: bash
        run: |
          if [ -z "${E2E_LIVE_ESN_CARD_IDENTIFIER}" ]; then
            echo "::error::Missing required environment secret: E2E_LIVE_ESN_CARD_IDENTIFIER. Configure an approved non-production ESNcard identity in the esncard-release-certification environment."
            exit 1
          fi

      - name: Validate required stack configuration
        shell: bash
        run: |
          for variable_name in FONT_AWESOME_TOKEN NEON_API_KEY NEON_PROJECT_ID CLIENT_ID CLIENT_SECRET ISSUER_BASE_URL SECRET STRIPE_API_KEY STRIPE_TEST_ACCOUNT_ID; do
            if [ -z "${!variable_name}" ]; then
              echo "::error::Missing required release-stack configuration: ${variable_name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate runtime environment
        run: bun run env:runtime

      - name: Run fail-closed release preflight
        run: bun helpers/testing/runtime-preflight.ts esncard-release

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Prepare Neon Local metadata directory
        run: |
          rm -rf "${NEON_LOCAL_METADATA_DIR}"
          mkdir -p "${NEON_LOCAL_METADATA_DIR}"
          chmod 0777 "${NEON_LOCAL_METADATA_DIR}"

      - name: Pull and build Docker images
        run: |
          docker compose pull
          docker compose build --pull

      - name: Start Docker stack
        run: |
          docker compose down --timeout 60 --remove-orphans
          docker compose up -d db db-expiration minio stripe minio-init
          for attempt in $(seq 1 60); do
            if docker compose exec -T db pg_isready -h 127.0.0.1 -p 5432 -U neon -d "${NEON_DATABASE_NAME}" >/dev/null 2>&1; then
              echo "Database is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Database did not become reachable within 120 seconds"
          docker compose ps
          exit 1

      - name: Confirm Neon branch expiration
        run: bun helpers/testing/set-neon-local-branch-expiration.ts

      - name: Start application container
        run: docker compose up -d evorto

      - name: Wait for application
        run: |
          ready_url="${BASE_URL}${APP_READY_PATH}"
          for attempt in $(seq 1 60); do
            ready_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${ready_url}" || true)"
            if [ "${ready_status}" = "204" ]; then
              echo "Application is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Application did not become reachable within 120 seconds"
          docker compose ps
          exit 1

      - name: Run provider-error UI and live ESNcard certification
        env:
          E2E_SELECTED_PROJECTS: local-chrome-live-esncard
          PLAYWRIGHT_SELECTED_PROJECTS: local-chrome-live-esncard
        run: bun run test:e2e:live-esncard:release

      - name: Stop Docker stack
        if: always()
        run: docker compose down --timeout 60 --remove-orphans
