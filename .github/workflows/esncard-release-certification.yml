name: Production Provider Certification

on:
  workflow_call:
    secrets:
      AUTH0_MANAGEMENT_CLIENT_ID:
        description: Auth0 Management client used by credential-backed integration journeys
        required: true
      AUTH0_MANAGEMENT_CLIENT_SECRET:
        description: Auth0 Management secret used by credential-backed integration journeys
        required: true
      CLIENT_ID:
        description: Auth0 application client id used by the certification stack
        required: true
      CLIENT_SECRET:
        description: Auth0 application secret used by the certification stack
        required: true
      E2E_ADMIN_USER_PASSWORD:
        description: Rotated password for the admin Playwright account
        required: true
      E2E_DEFAULT_USER_PASSWORD:
        description: Rotated password for the default Playwright account
        required: true
      E2E_EMPTY_USER_PASSWORD:
        description: Rotated password for the no-permissions Playwright account
        required: true
      E2E_GLOBAL_ADMIN_USER_PASSWORD:
        description: Rotated password for the global-admin Playwright account
        required: true
      E2E_ORGANIZER_USER_PASSWORD:
        description: Rotated password for the organizer Playwright account
        required: true
      E2E_REGULAR_USER_PASSWORD:
        description: Rotated password for the regular Playwright account
        required: true
      E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER:
        description: Approved permanently expired non-production ESNcard identity
        required: true
      E2E_LIVE_ESN_CARD_IDENTIFIER:
        description: Approved active non-production ESNcard identity
        required: true
      FONT_AWESOME_TOKEN:
        description: Font Awesome package registry token
        required: true
      PUBLIC_GOOGLE_MAPS_API_KEY:
        description: Browser-restricted Google Maps integration key
        required: true
      SECRET:
        description: Application session signing secret
        required: true
      STRIPE_TEST_API_KEY:
        description: Stripe test API key used by the certification stack
        required: true
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-certification
  cancel-in-progress: false

jobs:
  validate-protected-ref:
    name: Require protected main certification source
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reject unprotected certification refs
        env:
          CERTIFICATION_REF: ${{ github.ref }}
          CERTIFICATION_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          if [ "${CERTIFICATION_REF}" != "refs/heads/main" ]; then
            echo "::error::Provider certification may run only from refs/heads/main"
            exit 1
          fi
          if [ "${CERTIFICATION_REF_PROTECTED}" != "true" ]; then
            echo "::error::Provider certification requires a protected main ref"
            exit 1
          fi

  certify:
    name: Required Auth0, Google Maps, and ESNcard certification
    needs: validate-protected-ref
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: esncard-release-certification
    env:
      APP_HOST_PORT: 4200
      APP_READY_PATH: /readyz
      BASE_URL: http://localhost:4200
      CI: true
      COMPOSE_PROJECT_NAME: evorto-esncard-release
      DATABASE_URL: postgresql://evorto:evorto-certification-local@localhost:55432/appdb?sslmode=disable
      E2E_NOW_ISO: "2026-09-15T12:00:00.000Z"
      E2E_RUNTIME_MODE: playwright
      E2E_SEED_KEY: evorto-e2e-default-v1
      ISSUER_BASE_URL: ${{ vars.ISSUER_BASE_URL }}
      POSTGRES_DB: appdb
      POSTGRES_HOST_PORT: 55432
      POSTGRES_PASSWORD: evorto-certification-local
      POSTGRES_USER: evorto
      MAILPIT_HOST_PORT: 8025
      NO_WEBSERVER: true
      S3_ACCESS_KEY_ID: minioadmin
      S3_BUCKET: evorto-esncard-release
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: minioadmin
      STRIPE_TEST_ACCOUNT_ID: ${{ vars.STRIPE_TEST_ACCOUNT_ID }}
      STRIPE_WEBHOOK_SECRET: whsec_esncard_release_not_used
    steps:
      - name: Validate required provider certification configuration
        shell: bash
        env:
          AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
          AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER }}
          E2E_LIVE_ESN_CARD_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_IDENTIFIER }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_TEST_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: |
          for variable_name in FONT_AWESOME_TOKEN CLIENT_ID CLIENT_SECRET AUTH0_MANAGEMENT_CLIENT_ID AUTH0_MANAGEMENT_CLIENT_SECRET E2E_ADMIN_USER_PASSWORD E2E_DEFAULT_USER_PASSWORD E2E_EMPTY_USER_PASSWORD E2E_GLOBAL_ADMIN_USER_PASSWORD E2E_ORGANIZER_USER_PASSWORD E2E_REGULAR_USER_PASSWORD ISSUER_BASE_URL PUBLIC_GOOGLE_MAPS_API_KEY E2E_LIVE_ESN_CARD_IDENTIFIER E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER SECRET STRIPE_TEST_API_KEY STRIPE_TEST_ACCOUNT_ID; do
            if [ -z "${!variable_name}" ]; then
              echo "::error::Missing required provider certification configuration: ${variable_name}"
              exit 1
            fi
          done
          if [[ "${STRIPE_TEST_API_KEY}" != sk_test_* ]]; then
            echo "::error::STRIPE_TEST_API_KEY must be a Stripe test-mode secret key"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.15.0"

      - name: Install dependencies
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Generate runtime environment
        run: bun run env:runtime

      - name: Run fail-closed release preflight
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER }}
          E2E_LIVE_ESN_CARD_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_IDENTIFIER }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: bun helpers/testing/runtime-preflight.ts esncard-release

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Pull and build Docker images
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          docker compose pull
          docker compose build --pull

      - name: Start Docker stack
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: |
          docker compose down --timeout 60 --remove-orphans
          docker compose up -d db mailpit minio stripe minio-init
          for _ in $(seq 1 60); do
            if docker compose exec -T db pg_isready -h 127.0.0.1 -p 5432 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
              echo "Database is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Database did not become reachable within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100 db-setup mailpit minio minio-init worker evorto
          exit 1

      - name: Start application and polling worker containers
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: docker compose up -d worker evorto

      - name: Wait for application
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: |
          ready_url="${BASE_URL}${APP_READY_PATH}"
          for _ in $(seq 1 60); do
            ready_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${ready_url}" || true)"
            if [ "${ready_status}" = "204" ]; then
              echo "Application is reachable"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Application did not become reachable within 120 seconds"
          docker compose ps
          docker compose logs --no-color --tail=100 db-setup mailpit minio minio-init worker evorto
          exit 1

      - name: Run credential-backed Auth0 and Google Maps integration certification
        env:
          AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}
          AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          E2E_SELECTED_PROJECTS: local-chrome-integration,docs-integration
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          PLAYWRIGHT_SELECTED_PROJECTS: local-chrome-integration,docs-integration
          PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.PUBLIC_GOOGLE_MAPS_API_KEY }}
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: bun run test:e2e:integration

      - name: Run provider-error UI and live ESNcard certification
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          E2E_ADMIN_USER_PASSWORD: ${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          E2E_DEFAULT_USER_PASSWORD: ${{ secrets.E2E_DEFAULT_USER_PASSWORD }}
          E2E_EMPTY_USER_PASSWORD: ${{ secrets.E2E_EMPTY_USER_PASSWORD }}
          E2E_GLOBAL_ADMIN_USER_PASSWORD: ${{ secrets.E2E_GLOBAL_ADMIN_USER_PASSWORD }}
          E2E_ORGANIZER_USER_PASSWORD: ${{ secrets.E2E_ORGANIZER_USER_PASSWORD }}
          E2E_REGULAR_USER_PASSWORD: ${{ secrets.E2E_REGULAR_USER_PASSWORD }}
          E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_EXPIRED_IDENTIFIER }}
          E2E_LIVE_ESN_CARD_IDENTIFIER: ${{ secrets.E2E_LIVE_ESN_CARD_IDENTIFIER }}
          E2E_SELECTED_PROJECTS: local-chrome-live-esncard,docs-live-esncard
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
          PLAYWRIGHT_SELECTED_PROJECTS: local-chrome-live-esncard,docs-live-esncard
          SECRET: ${{ secrets.SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_TEST_API_KEY }}
        run: bun run test:e2e:live-esncard:release

      - name: Stop Docker stack
        if: always()
        env:
          FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
        run: docker compose down --timeout 60 --remove-orphans
