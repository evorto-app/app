<h2 mat-dialog-title>Update {{ data.event.title }}</h2>
<mat-dialog-content>
  <div class="mt-2 grid w-full gap-3">
    <mat-slide-toggle [formField]="visibilityForm.unlisted">
      Unlisted
    </mat-slide-toggle>
    <p class="text-on-surface-variant body-medium">
      Unlisted events are hidden from event lists. Eligible people can still
      open the event when they receive its direct link.
    </p>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button
    mat-button
    [mat-dialog-close]="visibilityForm.unlisted().value()"
    cdkFocusInitial
  >
    Save
  </button>
</mat-dialog-actions>
