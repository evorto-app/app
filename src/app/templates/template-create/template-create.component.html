<div class="mb-4 flex items-center gap-2">
  <a
    routerLink="/templates"
    mat-icon-button
    class="lg:hidden! block"
    aria-label="Back to templates"
  >
    <fa-duotone-icon [icon]="faArrowLeft" />
  </a>
  <h1 class="title-large">Create template</h1>
</div>
<main>
  @if (!defaultsReady()) {
    <p role="status" aria-live="polite">Preparing template defaults...</p>
  } @else {
    <form
      class="text-on-surface grid max-w-6xl gap-6"
      (submit)="onSubmit($event)"
    >
      <section
        class="border-outline-variant bg-surface grid gap-4 rounded-lg border p-4"
        aria-labelledby="template-details-title"
      >
        <h2 id="template-details-title" class="title-medium">
          Template details
        </h2>
        <app-template-general-form
          [generalForm]="templateForm"
          [iconUsage]="iconUsage"
        />
        <mat-checkbox [formField]="templateForm.unlisted">
          Hide this template from the standard template list
        </mat-checkbox>
      </section>

      <section class="border-outline-variant bg-surface rounded-lg border p-4">
        <app-template-graph-editor
          [defaultParticipantRoleIds]="defaultParticipantRoleIds()"
          [esnEnabled]="esnEnabled()"
          [graphForm]="templateForm"
          [taxRates]="taxRatesQuery.data() ?? []"
          [taxRateState]="taxRateState()"
        />
      </section>

      @if (createTemplateMutation.isError()) {
        <p class="text-error" role="alert">
          {{ errorMessage(createTemplateMutation.error()) }}
        </p>
      }

      <div class="flex justify-end">
        <button
          mat-flat-button
          type="submit"
          data-testid="save-template-graph"
          [disabled]="!canSubmit()"
        >
          {{
            createTemplateMutation.isPending() ? "Saving..." : "Save template"
          }}
        </button>
      </div>
    </form>
  }
</main>
